{% extends "base.html" %}

{% block title %}错误 {{ error_code }} - 文件备份系统{% endblock %}
{% block page_title %}错误 {{ error_code }}{% endblock %}
{% block breadcrumb %}错误{% endblock %}

{% block content %}
<div class="error-page">
    <h2 class="headline text-warning">{{ error_code }}</h2>

    <div class="error-content">
        <h3><i class="fas fa-exclamation-triangle text-warning"></i> 出错了！</h3>

        <p>
            {{ error_message }}
        </p>

        <p>
            您可以 <a href="{{ url_for('dashboard') }}">返回首页</a> 或者
            <a href="javascript:history.back()">返回上一页</a>。
        </p>

        <form class="search-form">
            <div class="input-group">
                <input type="text" name="search" class="form-control" placeholder="搜索">

                <div class="input-group-append">
                    <button type="submit" name="submit" class="btn btn-warning">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
            <!-- /.input-group -->
        </form>
    </div>
    <!-- /.error-content -->
</div>
<!-- /.error-page -->
{% endblock %}
